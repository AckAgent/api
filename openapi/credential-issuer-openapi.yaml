openapi: 3.0.0
info:
  title: AckAgent Credential Issuer Public API
  version: '1.0'
  license:
    name: Proprietary
    url: https://ackagent.com/terms
  description: |-
    Public API for the credential-issuer service (port 8000 only).

    ## Endpoints

    - **Public key distribution**: Verifiers fetch issuer public keys to validate
      BBS+ credential proofs offline.
    - **Captcha proof verification**: Third-party websites submit SDK-generated
      proofs for server-side validation.

    ## Authentication

    All endpoints in this spec are public and require no authentication.

tags:
  - name: Health
    description: Health and readiness check endpoints
  - name: Credentials
    description: Public credential verification endpoints

paths:
  /health:
    get:
      operationId: Health_get
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/credentials/public-keys:
    get:
      operationId: Credentials_getPublicKeys
      summary: Get issuer public keys
      description: |-
        Returns all active and recently-rotated issuer public keys. Verifiers
        use these to validate BBS+ credential proofs. No authentication required.
      tags: [Credentials]
      responses:
        '200':
          description: List of issuer public keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssuerPublicKey'

  /api/v1/credentials/verify-proof:
    post:
      operationId: Credentials_verifyCaptchaProof
      summary: Verify a captcha proof
      description: |-
        Public endpoint for third-party websites to verify a captcha proof
        envelope generated by the NaughtBot SDK. The proof is a base64url-encoded
        BBS+ selective disclosure proof with pseudonym binding. Returns the
        attestation details on success.
      tags: [Credentials]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCaptchaProofRequest'
      responses:
        '200':
          description: Proof is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyCaptchaProofResponse'
        '401':
          description: Proof verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyCaptchaProofResponse'
        '400':
          description: Invalid request (malformed proof, missing fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    IssuerPublicKey:
      type: object
      required: [id, publicKey, algorithm, createdAt]
      properties:
        id:
          type: string
          description: Unique key identifier
        publicKey:
          type: string
          format: byte
          description: Base64-encoded BLS12-381 G2 public key (96 bytes)
        algorithm:
          type: string
          description: Signing algorithm identifier
          example: BBS-BLS12381-SHA256
        createdAt:
          type: string
          format: date-time
        rotatedAt:
          type: string
          format: date-time
          nullable: true

    VerifyCaptchaProofRequest:
      type: object
      required: [proof, nonce, domain]
      properties:
        proof:
          type: string
          description: Base64url-encoded proof envelope from the NaughtBot SDK
        nonce:
          type: string
          description: Session nonce used during proof generation
        domain:
          type: string
          description: Domain of the requesting website

    VerifyCaptchaProofResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          description: Whether the proof is valid
        attestation:
          $ref: '#/components/schemas/CaptchaAttestation'
        error:
          type: string
          description: Human-readable error message (present when valid is false)

    CaptchaAttestation:
      type: object
      required: [attestationType, deviceType, expiresAt]
      properties:
        attestationType:
          type: string
          description: Type of attestation (e.g. biometric, device)
          example: biometric
        deviceType:
          type: string
          description: Device platform (e.g. ios, android)
          example: ios
        expiresAt:
          type: string
          format: date-time
          description: When the attestation expires

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message

servers:
  - url: http://localhost:8000
    description: Local development
