  /api/v1/credentials/enroll:
    post:
      operationId: Credentials_enroll
      summary: Enroll a BBS+ anonymous attestation credential
      description: |-
        Enrolls a new BBS+ credential with pseudonym support for a device.
        The device provides a blind commitment (with ZK proof) over its nym secret.
        The auth service verifies the device's attestation and binding signature,
        then requests a blind signature from the credential-issuer service.
      tags:
        - Credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollCredentialRequest'
      responses:
        '200':
          description: Credential enrolled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollCredentialResponse'
        '400':
          description: Invalid request (bad fields, binding signature invalid).
        '409':
          description: Active credential already exists for this device.
        '500':
          description: Internal server error.
  /api/v1/credentials/refresh:
    post:
      operationId: Credentials_refresh
      summary: Refresh a BBS+ anonymous attestation credential
      description: |-
        Refreshes an expiring credential. The device provides a new blind commitment
        (with ZK proof). The auth service revokes the old credential and issues a new one.
      tags:
        - Credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshCredentialRequest'
      responses:
        '200':
          description: Credential refreshed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollCredentialResponse'
        '400':
          description: Invalid request.
        '403':
          description: Device attestation or authorization policy forbids credential refresh.
        '404':
          description: No active credential found to refresh.
        '500':
          description: Internal server error.
  /api/v1/credentials/public-key:
    get:
      operationId: Credentials_getPublicKey
      summary: Get issuer public keys
      description: |-
        Returns issuer public keys for BBS+ credential verification.
        Proxies to the credential-issuer service. No authentication required.
      tags:
        - Credentials
      responses:
        '200':
          description: Issuer public keys.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssuerPublicKeyInfo'
      security:
        - {}
