            Lowercase hex-encoded P-256 auth public key (66 hex chars for P-256, 33 bytes: 0x02/0x03 || X (compressed
            P-256))
          example: 02b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2
        attestationType:
          $ref: e2ee-protocol-openapi.yaml#/components/schemas/AckAgent.Common.AttestationSecurityType
        authKeyBindingAssertion:
          type: string
          description: Auth key binding assertion proving ownership (base64)
        challengeId:
          type: string
          description: Challenge ID from /api/auth/challenge
        deviceName:
          type: string
          description: Device name for display
        apnsToken:
          type: string
          description: APNs token for push notifications (iOS)
      description: Re-login request - authenticate using a previously registered P-256 auth key
    ReLoginResponse:
      type: object
      properties:
        userId:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
      description: Re-login response
    RegisterRequest:
      type: object
      required:
        - authPublicKeyHex
        - attestationType
        - deviceName
      properties:
        authPublicKeyHex:
          type: string
          description: >-
            Lowercase hex-encoded P-256 auth public key for auth service authentication (66 hex chars for P-256, 33
            bytes: 0x02/0x03 || X (compressed P-256))
          example: 02b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2
        authAttestationObject:
          type: string
          description: App Attest attestation object for auth key (base64)
        authKeyBindingAssertion:
          type: string
          description: Key binding assertion proving auth key ownership (base64)
        authKeyBindingChallenge:
          type: string
          description: Challenge for auth key binding (base64)
        attestationType:
          $ref: e2ee-protocol-openapi.yaml#/components/schemas/AckAgent.Common.AttestationSecurityType
        deviceName:
          type: string
        encryptionPublicKeyHex:
          type: string
          description: >-
            Lowercase hex-encoded P-256 ECDH encryption public key, compressed format (66 hex chars for P-256, 33 bytes:
            0x02/0x03 || X (compressed P-256))
          example: 0200a3b2c1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
      description: Register request
    RegisterResponse:
      type: object
      properties:
        userId:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
      description: Register response
    RequesterResponse:
      type: object
      properties:
        id:
          type: string
        requesterId:
          type: string
        requesterName:
          type: string
        requesterUrl:
          type: string
        userId:
          type: string
        status:
          $ref: '#/components/schemas/RequesterStatus'
        createdAt:
          type: string
          format: date-time
      description: Requester response
    RequesterSessionInfo:
      type: object
      required:
        - id
        - requesterName
        - requesterPublicKeyHex
        - createdAt
        - expiresAt
      properties:
        id:
          type: string
          description: Session ID
        requesterName:
          type: string
        requesterPublicKeyHex:
          type: string
          description: >-
            Lowercase hex-encoded requester P-256 ECDH public key for SAS computation (66 hex chars, 33 bytes: 0x02/0x03
            || X (compressed P-256))
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
      description: Requester session info for list
    UpdateApproverRequest:
      type: object
      properties:
        deviceName:
          type: string
        deviceType:
          type: string
        apnsToken:
          type: string
        apnsEnvironment:
          type: string
          enum:
            - development
            - production
        fcmToken:
          type: string
        encryptionPublicKeyHex:
          type: string
          description: >-
            Lowercase hex-encoded P-256 ECDH public key for E2E encryption (66 hex chars for P-256, 33 bytes: 0x02/0x03
            || X (compressed P-256), no biometric)
        encryptionKeyBindingAssertion:
          type: string
          format: byte
          description: Assertion from attestation key binding encryption key
      description: Update approver request
    VerifyApproverSessionRequest:
      type: object
      properties:
        userId:
          type: string
          description: User ID from OIDC token
      description: Verify approver session request
    VerifyApproverSessionResponse:
      type: object
      properties:
        success:
          type: boolean
      description: Verify approver session response
    VerifyRequesterSessionRequest:
      type: object
      properties:
        userId:
          type: string
          description: User ID from OIDC token
      description: Verify requester session request
    VerifyRequesterSessionResponse:
      type: object
      required:
        - status
        - pairingId
      properties:
        status:
          type: string
          description: Verification status
        pairingId:
          type: string
          description: ID of the created requester pairing
      description: Verify requester session response
    EnrollCredentialRequest:
      type: object
      required:
        - commitmentWithProof
        - bindingSignature
        - deviceId
      properties:
        commitmentWithProof:
          type: string
          format: byte
          description: >-
            Base64-encoded blind commitment with ZK proof from bbs_commit_with_nym(). Proves the holder knows their nym
            secret without revealing it.
        bindingSignature:
          type: string
          format: byte
          description: >-
            Base64-encoded P-256 ECDSA signature over SHA256(commitmentWithProof), proving the attested device controls
            the commitment.
        deviceId:
          type: string
          description: Approver device UUID.
      description: Request to enroll a BBS+ anonymous attestation credential.
    RefreshCredentialRequest:
      type: object
      required:
        - commitmentWithProof
        - bindingSignature
        - deviceId
      properties:
        commitmentWithProof:
          type: string
          format: byte
          description: Base64-encoded blind commitment with ZK proof for the new credential.
        bindingSignature:
          type: string
          format: byte
          description: >-
            Base64-encoded P-256 ECDSA signature over SHA256(commitmentWithProof), proving the attested device controls
            the commitment.
        deviceId:
          type: string
          description: Approver device UUID.
      description: Request to refresh a BBS+ anonymous attestation credential.
    EnrollCredentialResponse:
      type: object
      required:
        - blindSignature
        - signerNymEntropy
        - issuerPublicKey
        - issuerPublicKeyId
        - messages
        - expiresAt
      properties:
        blindSignature:
          type: string
          format: byte
          description: Base64-encoded 80-byte BBS+ blind signature.
        signerNymEntropy:
          type: string
          format: byte
          description: >-
            Base64-encoded 32-byte issuer nym entropy. Combined with the holder's nym secret via
            bbs_verify_blind_sign_with_nym() to derive the combined nym secret used for pseudonym generation.
        issuerPublicKey:
          type: string
          format: byte
          description: Base64-encoded 96-byte BLS12-381 G2 issuer public key.
        issuerPublicKeyId:
          type: string
          description: Unique identifier of the issuer key that signed this credential.
        messages:
          type: array
          items:
            type: string
            format: byte
          description: >-
            Base64-encoded signer messages in signing order: [attestationType, deviceType, issuedAt, expiresAt]. The
            holder needs these exact values for blind signature verification and later proof generation.
        expiresAt:
          type: integer
          format: int64
          description: Credential expiry as Unix epoch seconds.
      description: >-
        Response containing the blind signature, issuer nym entropy, and signer messages. The holder must call
        bbs_verify_blind_sign_with_nym() to verify the signature and extract the combined nym secret.
    IssuerPublicKeyInfo:
      type: object
      required:
        - id
        - publicKey
        - algorithm
        - createdAt
      properties:
        id:
          type: string
          description: Unique key identifier.
        publicKey:
          type: string
          format: byte
          description: Base64-encoded BLS12-381 G2 public key (96 bytes).
        algorithm:
          type: string
          description: Signing algorithm identifier.
        createdAt:
          type: string
          format: date-time
        rotatedAt:
          type: string
          format: date-time
          nullable: true
      description: Issuer public key information for BBS+ credential verification.
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth2 access token issued by the OIDC service.
servers:
  - url: http://127.0.0.1:4455
    description: Local development
  - url: https://auth.ackagent.com
    description: Production
