openapi: 3.0.0
info:
  title: AckAgent Identity API (AckAgent Profile)
  version: '1.0'
  license:
    name: Proprietary
    url: https://ackagent.com/terms
  description: >-
    REST API for user authentication, device management, and session handling.


    ## Actor Types


    - **Requesters**: Clients that initiate signing requests (CLI, web apps). Limited trust - can only decrypt responses
    to their own requests.

    - **Approvers**: Mobile devices that approve requests and hold signing keys. High trust - hardware-backed keys, can
    decrypt ALL requests.


    ## Authentication


    Most endpoints require OIDC Bearer token authentication. Tokens are issued by the Identity service after successful
    registration or re-login.


    ## Session Flows


    - **Requester Sessions**: CLI/web apps create sessions, scan QR codes, and verify SAS to receive tokens

    - **Approver Sessions**: New mobile devices link to existing accounts via QR code and SAS verification
tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Core authentication endpoints
  - name: Approvers
    description: Approver device management
  - name: Requesters
    description: Requester registration and management
  - name: Attestation
    description: Device attestation verification
  - name: Requester Sessions
    description: CLI/web login sessions
  - name: Approver Sessions
    description: Device linking sessions
  - name: Connections
    description: Connection management
  - name: User
    description: User-specific operations
  - name: Internal
    description: Service-to-service communication (not publicly accessible)
