name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-specs:
    name: Lint OpenAPI Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - run: pnpm install

      - run: make lint

  verify-go:
    name: Verify Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: pnpm install

      - run: make bundle-protocol generate-go

      - run: go build ./...

  verify-ts:
    name: Verify TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - run: pnpm install

      - run: make bundle-protocol generate-ts

  verify-kotlin:
    name: Verify Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin library
        working-directory: kotlin
        run: ./gradlew build
